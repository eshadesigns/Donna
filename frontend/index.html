<!DOCTYPE html>
<html>
<head>
  <title>Donna</title>
  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      margin-top:50px;
    }

    #chat{
      width:500px;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    #messages{
      height:350px;
      overflow-y:auto;
      border:1px solid #ddd;
      padding:10px;
      margin-bottom:10px;
    }

    .user{color:blue;text-align:right;margin:8px;}
    .bot{color:black;text-align:left;margin:8px;}

    input{width:80%;padding:10px}
    button{padding:10px}
  </style>
</head>

<body>

<div id="chat">
<h2>Donna</h2>

<div id="messages"></div>

<input id="input" placeholder="Ask about a business"/>
<button onclick="send()">Send</button>

</div>

<script>

const messages=document.getElementById("messages")

function add(text,type){
 const msg=document.createElement("div")
 msg.className=type
 msg.innerText=text
 messages.appendChild(msg)
 messages.scrollTop=messages.scrollHeight
}

async function send(){

 const input=document.getElementById("input")
 const question=input.value

 if(!question)return

 add(question,"user")
 input.value=""

 add("Thinking...","bot")

 const res=await fetch("http://localhost:3000/ask",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({question})
 })

 const data=await res.json()

 add(data.answer,"bot")

}

document.getElementById("input").addEventListener("keypress",(e)=>{
 if(e.key==="Enter")send()
})

</script>

</body>
</html>
